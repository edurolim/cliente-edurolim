<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir prefix="cwd">.</dir>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Arial</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Inter</string>
    </edit>
  </match>
  <match target="pattern">
    <test qual="any" name="family">
      <string>Impact</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>Liberation Sans Narrow</string>
    </edit>
  </match>
</fontconfig>
